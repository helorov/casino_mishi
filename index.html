<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Фиолетовое Треш-Казино 🎰</title>
    <style>
        /* Темно-фиолетовый фон всего сайта */
        body { 
            background: #120a21; 
            color: #e0d5f5; 
            font-family: 'Arial Black', Gadget, sans-serif; 
            text-align: center; 
            padding-top: 40px; 
        }
        /* Главный блок казино */
        .casino { 
            background: #25133d; 
            border: 5px solid #8a2be2; 
            border-radius: 20px; 
            display: inline-block; 
            padding: 40px; 
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.6); 
        }
        h1 { color: #ba55d3; text-shadow: 2px 2px #000; font-size: 32px; }
        /* 5 слотов в ряд */
        .slots-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
        }
        .slot { 
            font-size: 55px; 
            background: #3d1e63;
            border: 3px solid #ba55d3;
            border-radius: 10px;
            width: 80px;
            height: 90px;
            line-height: 90px;
            text-shadow: 2px 2px #000;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        /* Кнопка */
        button { 
            background: #ba55d3; 
            color: white;
            border: none; 
            padding: 15px 40px; 
            font-size: 22px; 
            font-weight: bold; 
            border-radius: 10px; 
            cursor: pointer; 
            box-shadow: 0 5px #6a1b9a;
            transition: 0.1s;
        }
        button:hover { background: #d87093; }
        button:active { box-shadow: 0 2px #6a1b9a; transform: translateY(3px); }
        .status { font-size: 22px; margin: 20px 0; min-height: 30px; color: #ffb7ff; }
        .balance { font-size: 26px; color: #00ffcc; text-shadow: 1px 1px #000; }
        .rules { font-size: 14px; color: #a493c2; margin-top: 25px; text-align: left; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="casino">
        <h1>🎰 СУПЕР СЛОВАРЬ КАЗИНО 🎰</h1>
        <div class="balance">Баланс: $<span id="balance">100</span></div>
        
        <!-- Пять слотов под буквы -->
        <div class="slots-container">
            <div class="slot" id="s1">П</div>
            <div class="slot" id="s2">О</div>
            <div class="slot" id="s3">П</div>
            <div class="slot" id="s4">А</div>
            <div class="slot" id="s5">!</div>
        </div>

        <div class="status" id="status">Ставка $10. Испытай удачу!</div>
        <button onclick="spin()">КРУТИТЬ! ($10)</button>

        <!-- Правила игры внизу -->
        <div class="rules">
            <strong>Правила выплат:</strong><br>
            • 5 букв <b>Р Р Р Р Р</b> — Выигрыш <b>х20</b> ($200)<br>
            • Собралось слово <b>ПОПА, ЖОПА или ПИСЯ</b> — Мега-Куш <b>х100</b> ($1000)
        </div>
    </div>

    <script>
        let balance = 100;
        // Все буквы русского алфавита
        const alphabet = "АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ";

        function spin() {
            if (balance < 10) {
                document.getElementById('status').innerText = "❌ ДЕНЕГ НЕТ! Обнови страницу, чтобы баланс вернулся.";
                return;
            }

            // Списываем ставку
            balance -= 10;
            document.getElementById('balance').innerText = balance;

            // Генерируем 5 случайных букв
            let b1 = alphabet[Math.floor(Math.random() * alphabet.length)];
            let b2 = alphabet[Math.floor(Math.random() * alphabet.length)];
            let b3 = alphabet[Math.floor(Math.random() * alphabet.length)];
            let b4 = alphabet[Math.floor(Math.random() * alphabet.length)];
            let b5 = alphabet[Math.floor(Math.random() * alphabet.length)];

            // Выводим буквы на экран в слоты
            document.getElementById('s1').innerText = b1;
            document.getElementById('s2').innerText = b2;
            document.getElementById('s3').innerText = b3;
            document.getElementById('s4').innerText = b4;
            document.getElementById('s5').innerText = b5;

            // Собираем буквы в одну строку, чтобы проверить на слова
            let resultWord = b1 + b2 + b3 + b4 + b5;

            // Проверка условий выигрыша
            if (b1==='Р' && b2==='Р' && b3==='Р' && b4==='Р' && b5==='Р') {
                // Если все РРРРР
                balance += 200;
                document.getElementById('status').innerText = "⚡ РРРРР! Выигрыш х20! Получи $200!";
            } 
            else if (resultWord.includes("ПОПА") || resultWord.includes("ЖОПА") || resultWord.includes("ПИСЯ")) {
                // Если выпало секретное слово
                balance += 1000;
                document.getElementById('status').innerText = "🎉 ОФИГЕТЬ! Выпало СЕКРЕТНОЕ СЛОВО! Выигрыш х100 ($1000)!";
            } 
            else {
                // Если ничего не совпало
                document.getElementById('status').innerText = "😢 Мимо! Попробуй еще раз.";
            }

            // Обновляем баланс на экране
            document.getElementById('balance').innerText = balance;
        }
    </script>
</body>
</html>
