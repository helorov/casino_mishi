<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
    <title>🎰 КАЗИК • 1488 1337 228</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 50% 30%, #1a1a1a, #0a0a0a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Impact', 'Arial Black', sans-serif;
            padding: 15px;
        }

        .machine {
            background: linear-gradient(180deg, #1c1c1c 0%, #111 100%);
            border: 4px solid #c9a03b;
            border-radius: 30px;
            padding: 25px 22px 30px;
            box-shadow: 0 0 40px rgba(255, 200, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            max-width: 500px;
            width: 100%;
        }

        /* БАЛАНС */
        .balance-panel {
            background: #000;
            border: 3px solid #b5942e;
            border-radius: 35px;
            padding: 10px 28px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #ffd966;
            font-weight: bold;
            font-size: 1.8rem;
            text-shadow: 0 0 12px #ffb703;
            letter-spacing: 1px;
        }
        .balance-label {
            font-size: 1rem;
            color: #b49450;
        }
        #balanceDisplay {
            font-family: 'Courier New', monospace;
            font-size: 2.2rem;
            min-width: 70px;
            text-align: center;
            transition: 0.2s;
        }

        /* СТАВКА */
        .bet-panel {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #0f0f0f;
            border: 2px solid #997a2e;
            border-radius: 30px;
            padding: 10px 20px;
        }
        .bet-label {
            color: #ccb37e;
            font-weight: bold;
            font-size: 1rem;
        }
        #betInput {
            width: 85px;
            padding: 8px 10px;
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            border-radius: 20px;
            border: 2px solid #c9a03b;
            background: #1a1a1a;
            color: #ffd966;
            outline: none;
            font-family: 'Courier New', monospace;
        }

        /* СЛОТЫ */
        .reels-row {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 10px;
            background: #111;
            border-radius: 20px;
            padding: 18px 12px;
            border: 3px solid #555;
        }
        .slot {
            width: 65px;
            height: 85px;
            background: #fef9e7;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.8rem;
            font-weight: 900;
            color: #1a1a1a;
            border: 3px solid #c9a03b;
            box-shadow: inset 0 -6px 0 #b3923c, 0 6px 10px rgba(0,0,0,0.6);
            transition: 0.1s ease;
            font-family: 'Courier New', monospace;
        }
        .slot.jackpot-glow {
            background: #ffd966;
            box-shadow: 0 0 28px 10px #f5b81b, inset 0 -6px 0 #e6a800;
            border-color: #ffaa00;
            color: #000;
            transform: scale(1.05);
        }
        .slot.lose-flash {
            background: #5c1a1a;
            color: #ffcccc;
            transition: 0.1s;
        }
        .slot.dep-flash {
            background: #ff9800;
            color: #000;
            transition: 0.1s;
        }

        /* СООБЩЕНИЕ */
        .message {
            background: #050505;
            color: #ffd966;
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            padding: 12px 18px;
            border-radius: 35px;
            letter-spacing: 1px;
            border: 2px solid #b5942e;
            width: 100%;
            text-shadow: 0 0 8px #ffb703;
            min-height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .message.dep-message {
            color: #ff9800;
            text-shadow: 0 0 20px #ff9800;
            font-size: 2rem;
            letter-spacing: 5px;
            animation: depPulse 0.3s ease-in-out 3;
        }
        @keyframes depPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        /* КНОПКА */
        .btn-spin {
            background: #c62828;
            border: none;
            color: #fff3cd;
            font-size: 2rem;
            font-weight: bold;
            padding: 16px 50px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 7px 0 #7f1d1d, 0 12px 20px rgba(0,0,0,0.6);
            letter-spacing: 3px;
            transition: 0.06s linear;
            text-transform: uppercase;
            border: 2px solid #e6b422;
        }
        .btn-spin:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #5e1212, 0 6px 10px black;
        }
        .btn-spin:disabled {
            opacity: 0.55;
            transform: translateY(3px);
            box-shadow: 0 3px 0 #5e1212;
            pointer-events: none;
        }

        /* КНОПКА СБРОСА */
        .btn-reset {
            background: #333;
            border: 2px solid #555;
            color: #999;
            font-size: 0.9rem;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.1s;
        }
        .btn-reset:active {
            background: #555;
            color: #fff;
        }

        /* ТАБЛИЦА */
        .prizes {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            color: #ccb37e;
            font-weight: bold;
            font-size: 0.85rem;
        }
        .prizes span {
            background: #1f1f1f;
            padding: 5px 12px;
            border-radius: 25px;
            border: 1px solid #997a2e;
        }

        /* ПРЕДУПРЕЖДЕНИЕ */
        .anti-cheat-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #ff4444;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
        }
        .anti-cheat-warning.active {
            display: flex;
        }

        @media (max-width: 420px) {
            .slot {
                width: 50px;
                height: 70px;
                font-size: 2.8rem;
            }
            .btn-spin {
                font-size: 1.5rem;
                padding: 12px 30px;
            }
            #betInput {
                width: 65px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <!-- АНТИ-ЧИТ ПРЕДУПРЕЖДЕНИЕ -->
    <div class="anti-cheat-warning" id="antiCheatWarning">
        <div>🚫 ЧИТЫ ЗАПРЕЩЕНЫ 🚫</div>
        <div style="font-size:1rem; margin-top:20px; color:#ff9800;">Закрой инструменты разработчика</div>
    </div>

    <div class="machine" id="machineContainer">
        <!-- Баланс -->
        <div class="balance-panel">
            <span class="balance-label">💰 БАЛАНС</span>
            <span id="balanceDisplay">1488</span>
        </div>

        <!-- Ставка -->
        <div class="bet-panel">
            <span class="bet-label">🎯 СТАВКА</span>
            <input type="number" id="betInput" value="100" min="1" step="1">
        </div>

        <!-- 5 слотов -->
        <div class="reels-row" id="reelsContainer">
            <div class="slot" id="slot0">0</div>
            <div class="slot" id="slot1">0</div>
            <div class="slot" id="slot2">0</div>
            <div class="slot" id="slot3">0</div>
            <div class="slot" id="slot4">0</div>
        </div>

        <!-- Сообщение -->
        <div class="message" id="messageDisplay">
            🎲 ДЕЛАЙ СТАВКУ • КРУТИ
        </div>

        <!-- Кнопки -->
        <button class="btn-spin" id="spinButton">🎰 СПИН</button>
        <button class="btn-reset" id="resetButton">🔄 СБРОС БАЛАНСА</button>

        <!-- Таблица -->
        <div class="prizes">
            <span>🔥 1488 = ×100</span>
            <span>💀 1337 = ×50</span>
            <span>🍀 228 = ×25</span>
        </div>
    </div>

    <script>
        // ==================== ЗАЩИТА ОТ ИНСПЕКТОРА КОДА ====================
        (function() {
            const warning = document.getElementById('antiCheatWarning');
            const machine = document.getElementById('machineContainer');

            // Проверка на DevTools через размер окна
            function detectDevTools() {
                const threshold = 160;
                const widthThreshold = window.outerWidth - window.innerWidth > threshold;
                const heightThreshold = window.outerHeight - window.innerHeight > threshold;
                return widthThreshold || heightThreshold;
            }

            // Проверка через console.log (переопределение)
            function checkConsoleOpen() {
                const element = new Image();
                Object.defineProperty(element, 'id', {
                    get: function() {
                        // Срабатывает только при открытой консоли
                        showWarning();
                        return '';
                    }
                });
                console.log(element);
            }

            // Проверка через время выполнения (отладчик замедляет)
            function checkDebugger() {
                const start = performance.now();
                debugger;
                const end = performance.now();
                if (end - start > 100) {
                    showWarning();
                }
            }

            function showWarning() {
                warning.classList.add('active');
                machine.style.display = 'none';
                // Очищаем localStorage при попытке читерства
                try {
                    localStorage.removeItem('kazik_balance');
                } catch(e) {}
            }

            function hideWarning() {
                warning.classList.remove('active');
                machine.style.display = '';
            }

            // Постоянная проверка DevTools
            setInterval(() => {
                if (detectDevTools()) {
                    showWarning();
                } else if (warning.classList.contains('active')) {
                    // Не скрываем автоматически — нужно обновить страницу
                }
            }, 1000);

            // Защита от отладчика
            setInterval(() => {
                const start = performance.now();
                debugger;
                const end = performance.now();
                if (end - start > 100) {
                    showWarning();
                }
            }, 2000);

            // Блокировка клавиши F12 и Ctrl+Shift+I/C/J
            document.addEventListener('keydown', function(e) {
                if (
                    e.key === 'F12' ||
                    (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'C' || e.key === 'J')) ||
                    (e.ctrlKey && e.key === 'U')
                ) {
                    e.preventDefault();
                    showWarning();
                    return false;
                }
            });

            // Блокировка правой кнопки мыши
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            });

            // Дополнительная защита: очистка консоли
            setTimeout(() => {
                console.clear();
            }, 100);
        })();

        // ==================== ОСНОВНОЙ КОД ====================
        (function() {
            const SLOTS = 5;

            const JACKPOTS = {
                "1488": { emoji: "🔥", multiplier: 100 },
                "1337": { emoji: "💀", multiplier: 50 },
                "228":  { emoji: "🍀", multiplier: 25 }
            };

            const GUARANTEE_CODES = ["1488", "1337", "228"];
            const DEP_INTERVAL = 2 * 60;
            const DEP_AMOUNT = 1500;
            const GUARANTEE_SPINS = 5;
            const STORAGE_KEY = 'kazik_balance';

            let digits = ["0", "0", "0", "0", "0"];
            let balance = 1488;
            let currentBet = 100;
            let depTimer = DEP_INTERVAL;
            let spinsUntilGuarantee = GUARANTEE_SPINS;
            let timerInterval = null;

            const slotEls = [
                document.getElementById('slot0'),
                document.getElementById('slot1'),
                document.getElementById('slot2'),
                document.getElementById('slot3'),
                document.getElementById('slot4')
            ];
            const balanceEl = document.getElementById('balanceDisplay');
            const messageEl = document.getElementById('messageDisplay');
            const spinBtn = document.getElementById('spinButton');
            const betInput = document.getElementById('betInput');
            const resetBtn = document.getElementById('resetButton');

            let isSpinning = false;
            let depMessageTimeout = null;

            // Сохранение
            function saveBalance() {
                try {
                    localStorage.setItem(STORAGE_KEY, balance.toString());
                } catch (e) {}
            }

            function loadBalance() {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved !== null) {
                        const parsed = parseInt(saved);
                        if (!isNaN(parsed) && parsed >= 0) return parsed;
                    }
                } catch (e) {}
                return 1488;
            }

            function resetBalance() {
                balance = 1488;
                saveBalance();
                updateBalanceDisplay();
                if (currentBet > balance) setBet(balance > 0 ? balance : 1);
                messageEl.innerHTML = "🔄 БАЛАНС СБРОШЕН • 1488";
            }

            function giveDep() {
                balance += DEP_AMOUNT;
                saveBalance();
                updateBalanceDisplay();

                slotEls.forEach(el => el.classList.add('dep-flash'));
                setTimeout(() => {
                    slotEls.forEach(el => el.classList.remove('dep-flash'));
                }, 500);

                messageEl.textContent = 'ДЕП ДЕП ДЕП';
                messageEl.classList.add('dep-message');

                if (depMessageTimeout) clearTimeout(depMessageTimeout);
                depMessageTimeout = setTimeout(() => {
                    messageEl.classList.remove('dep-message');
                    messageEl.innerHTML = `🧠 +${DEP_AMOUNT} • БАЛАНС ${balance}`;
                }, 1500);

                if (currentBet > balance) setBet(balance > 0 ? balance : 1);
            }

            function startDepTimer() {
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    depTimer--;
                    if (depTimer <= 0) {
                        giveDep();
                        depTimer = DEP_INTERVAL;
                    }
                }, 1000);
            }

            function randomDigit() {
                return Math.floor(Math.random() * 10).toString();
            }

            function randomFourDigits(excludeCodes = []) {
                let code;
                do {
                    code = '';
                    for (let i = 0; i < 4; i++) {
                        code += randomDigit();
                    }
                } while (excludeCodes.includes(code));
                return code;
            }

            function renderDigits() {
                for (let i = 0; i < SLOTS; i++) {
                    slotEls[i].textContent = digits[i];
                }
            }

            function updateBalanceDisplay() {
                balanceEl.textContent = balance;
                balanceEl.style.color = balance < currentBet ? '#ff6b6b' : '#ffd966';
            }

            function clearGlow() {
                slotEls.forEach(el => {
                    el.classList.remove('jackpot-glow');
                    el.classList.remove('lose-flash');
                });
            }

            function checkJackpot() {
                const code = digits.slice(0, 4).join('');
                return JACKPOTS[code] || null;
            }

            function getBetFromInput() {
                let val = parseInt(betInput.value);
                if (isNaN(val) || val < 1) val = 1;
                if (val > balance) val = balance;
                betInput.value = val;
                currentBet = val;
                return currentBet;
            }

            function setBet(value) {
                let val = parseInt(value);
                if (isNaN(val) || val < 1) val = 1;
                if (val > balance) val = balance;
                betInput.value = val;
                currentBet = val;
            }

            function generateFinalDigits() {
                if (spinsUntilGuarantee <= 1) {
                    const guaranteedCode = GUARANTEE_CODES[Math.floor(Math.random() * GUARANTEE_CODES.length)];
                    for (let i = 0; i < 4; i++) {
                        digits[i] = guaranteedCode[i];
                    }
                    digits[4] = randomDigit();
                    spinsUntilGuarantee = GUARANTEE_SPINS;
                    return true;
                } else {
                    const exclude = [...GUARANTEE_CODES];
                    const code = randomFourDigits(exclude);
                    for (let i = 0; i < 4; i++) {
                        digits[i] = code[i];
                    }
                    digits[4] = randomDigit();
                    spinsUntilGuarantee--;
                    return false;
                }
            }

            function processResult() {
                clearGlow();
                const jackpot = checkJackpot();

                if (jackpot) {
                    for (let i = 0; i < 4; i++) {
                        slotEls[i].classList.add('jackpot-glow');
                    }
                    const winAmount = currentBet * jackpot.multiplier;
                    balance += winAmount;
                    saveBalance();
                    updateBalanceDisplay();
                    messageEl.innerHTML = `💥 ДЖЕКПОТ ${jackpot.emoji} +${winAmount} (×${jackpot.multiplier}) !!!`;
                    if (currentBet > balance) setBet(balance);
                } else {
                    balance -= currentBet;
                    saveBalance();
                    updateBalanceDisplay();
                    slotEls.forEach(el => el.classList.add('lose-flash'));
                    setTimeout(() => {
                        slotEls.forEach(el => el.classList.remove('lose-flash'));
                    }, 200);
                    messageEl.innerHTML = `❌ МИМО • −${currentBet}`;
                    if (balance < currentBet) setBet(balance > 0 ? balance : 1);
                }

                if (balance <= 0) {
                    messageEl.innerHTML = "💸 БАЛАНС ПУСТ • ЖДИ ДЕП";
                }
            }

            function spin() {
                if (isSpinning) return;
                getBetFromInput();

                if (balance <= 0) {
                    messageEl.innerHTML = "💸 НЕТ БАЛАНСА • ЖДИ ДЕП";
                    return;
                }
                if (currentBet > balance) {
                    messageEl.innerHTML = "⚠️ СТАВКА БОЛЬШЕ БАЛАНСА";
                    setBet(balance);
                    return;
                }
                if (currentBet < 1) setBet(1);

                isSpinning = true;
                spinBtn.disabled = true;
                betInput.disabled = true;

                let flickCount = 0;
                const maxFlicks = 8;
                const flickInterval = setInterval(() => {
                    for (let i = 0; i < SLOTS; i++) {
                        slotEls[i].textContent = randomDigit();
                    }
                    flickCount++;
                    if (flickCount >= maxFlicks) {
                        clearInterval(flickInterval);
                        generateFinalDigits();
                        renderDigits();
                        processResult();
                        isSpinning = false;
                        spinBtn.disabled = false;
                        betInput.disabled = false;
                        updateBalanceDisplay();
                    }
                }, 50);
            }

            spinBtn.addEventListener('click', spin);
            betInput.addEventListener('change', getBetFromInput);
            resetBtn.addEventListener('click', resetBalance);

            document.addEventListener('keydown', function(e) {
                if (e.code === 'Space' && !isSpinning && document.activeElement !== betInput) {
                    e.preventDefault();
                    spin();
                }
            });

            function init() {
                for (let i = 0; i < SLOTS; i++) {
                    digits[i] = randomDigit();
                }
                renderDigits();
                balance = loadBalance();
                setBet(100);
                updateBalanceDisplay();
                clearGlow();
                messageEl.innerHTML = "🎲 ДЕЛАЙ СТАВКУ • КРУТИ";
                isSpinning = false;
                spinBtn.disabled = false;
                betInput.disabled = false;
                depTimer = DEP_INTERVAL;
                spinsUntilGuarantee = GUARANTEE_SPINS;
                startDepTimer();
            }

            init();
        })();
    </script>
</body>
</html>
